name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  generate:
    name: Generate & verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install protoc
        run: |
          PB_VERSION=27.1
          curl -sLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PB_VERSION}/protoc-${PB_VERSION}-linux-x86_64.zip"
          sudo unzip -o /tmp/protoc.zip bin/protoc 'include/*' -d /usr/local

      - name: Install Go protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python protoc tools
        run: pip install grpcio-tools

      - name: Generate code
        run: make generate

      - name: Verify no uncommitted changes in gen/
        run: |
          git diff --exit-code gen/ || \
            (echo "Generated code is out of date. Run 'make generate' and commit." && exit 1)

  lint:
    name: Lint protos (buf)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint
        run: buf lint

      - name: Check breaking changes
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=main"

  release:
    name: Release Python package
    runs-on: ubuntu-latest
    needs: [generate, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        run: |
          pip install hatchling build
          cd gen/python
          python -m build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: speechmux-proto-python
          path: gen/python/dist/
